appId: com.localcut.pro
productName: LocalCut Pro
copyright: Copyright © 2026 LocalCut Pro

directories:
  output: dist-electron-release
  buildResources: public

files:
  - dist-electron/**/*
  - dist-electron/renderer/**/*

extraResources:
  # ONNX 模型文件（随应用分发，不打包进 asar）
  - from: public/models
    to: models
    filter:
      - "*.onnx"
  # ORT WASM 运行时文件
  - from: node_modules/onnxruntime-web/dist
    to: wasm
    filter:
      - "*.wasm"
      - "*.mjs"
      - "*.js"
      - "*.json"

asar:
  smartUnpack: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: LocalCut Pro
  installerIcon: public/icon.ico
  uninstallerIcon: public/icon.ico
  installerHeaderIcon: public/icon.ico

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.graphics-design
  icon: public/icon.icns

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Graphics
  icon: public/icon.ico
